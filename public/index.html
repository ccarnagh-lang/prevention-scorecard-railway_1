<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prevention Scorecard</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-mark">PS</div>
        <div>
          <div class="login-brand">Prevention Scorecard</div>
          <div class="login-sub">Child Welfare Compliance System</div>
        </div>
      </div>
      <div id="login-error" class="login-error hidden"></div>
      <div class="login-field">
        <label>Email address</label>
        <input type="email" id="l-email" placeholder="you@agency.org" autocomplete="email">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="l-pw" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="login-btn" onclick="Auth.login()">Sign in</button>
      <div class="demo-roles">
        <div class="demo-label">Demo — sign in as:</div>
        <div class="demo-grid">
          <div class="demo-role" onclick="Auth.quickLogin('sarah.chen@agency.org')">
            <div class="demo-role-icon" style="background:#534AB7">E</div>
            <div class="demo-role-name">Executive</div>
            <div class="demo-role-sub">All programs</div>
          </div>
          <div class="demo-role" onclick="Auth.quickLogin('james.okafor@agency.org')">
            <div class="demo-role-icon" style="background:#0F6E56">D</div>
            <div class="demo-role-name">Director</div>
            <div class="demo-role-sub">My program</div>
          </div>
          <div class="demo-role" onclick="Auth.quickLogin('kevin.joseph@agency.org')">
            <div class="demo-role-icon" style="background:#993C1D">S</div>
            <div class="demo-role-name">Supervisor</div>
            <div class="demo-role-sub">My cases</div>
          </div>
          <div class="demo-role" onclick="Auth.quickLogin('maria.rendon@agency.org')">
            <div class="demo-role-icon" style="background:#1B3A5C">P</div>
            <div class="demo-role-name">Case Planner</div>
            <div class="demo-role-sub">Enter data</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="app-screen hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-mark">PS</div>
      <div>
        <div class="sb-brand">Prevention Scorecard</div>
        <div class="sb-org" id="sb-org">Loading...</div>
      </div>
    </div>
    <div class="role-chip" id="role-chip"></div>
    <nav id="sb-nav" class="sb-nav"></nav>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-av" id="sb-av"></div>
        <div>
          <div class="sb-uname" id="sb-uname"></div>
          <div class="sb-urole" id="sb-urole"></div>
        </div>
      </div>
      <button class="sb-logout" onclick="Auth.logout()">Sign out</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="tb-left">
        <h1 class="tb-title" id="tb-title">Dashboard</h1>
      </div>
      <div class="tb-right" id="tb-right"></div>
    </header>
    <div class="content" id="main-content">
      <div class="loading">Loading...</div>
    </div>
  </main>
</div>

<div id="toast-wrap"></div>
<div id="modal-wrap" class="modal-wrap hidden">
  <div class="modal-box" id="modal-box"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/views/executive.js"></script>
<script src="/js/views/shared.js"></script>
<script src="/js/views/admin.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
